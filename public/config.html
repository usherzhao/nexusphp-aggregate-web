<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>系统配置 - NexusPHP 聚合查询助手</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <div>
        <h1>系统配置</h1>
        <p>配置 NexusPHP 站点 Cookie、搜索参数以及 Transmission RPC。保存后除端口外会立即生效。</p>
      </div>
      <div class="status-card">
        <a class="nav-link" href="/">订阅追番</a>
        <a class="nav-link" href="/search.html">聚合搜索</a>
        <a class="nav-link" href="/ai.html">AI 订阅助手</a>
      </div>
    </section>

    <section class="panel">
      <div class="section-header">
        <h2>基础配置</h2>
        <button id="reloadButton" type="button" class="secondary">重新加载</button>
      </div>
      <form id="configForm" class="config-form"></form>
      <div class="actions config-actions">
        <button id="saveButton" type="button">保存配置</button>
        <button id="testTransmissionButton" type="button" class="secondary">测试 Transmission</button>
      </div>
      <div id="configMessage" class="config-message"></div>
    </section>

    <section class="panel">
      <div class="section-header">
        <h2>NexusPHP 站点</h2>
        <button id="addSiteButton" type="button" class="secondary">添加站点</button>
      </div>
      <div id="sitesEditor" class="site-editor-list"></div>
    </section>
  </main>
  <script src="/config.js"></script>
</body>
</html>
